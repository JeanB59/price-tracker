<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceTrack 2026 | SaaS Dashboard</title>
    
    <!-- ÉTAPE 1 : Chargement des bibliothèques dans le bon ordre -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ÉTAPE CRUCIALE : PropTypes est requis par Recharts en mode UMD -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- Icônes FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0a0c10; 
            color: #f1f5f9;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card { 
            background: rgba(15, 17, 23, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        .custom-gradient {
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const App = () => {
            const [view, setView] = useState('dashboard');
            const [selectedEnseigne, setSelectedEnseigne] = useState('Leclerc');
            const [isLibLoaded, setIsLibLoaded] = useState(false);

            useEffect(() => {
                // On vérifie la présence de Recharts dans l'objet window
                if (window.Recharts) {
                    setIsLibLoaded(true);
                }
            }, []);

            if (!isLibLoaded) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#0f1117]">
                        <div className="text-sky-500 font-bold animate-pulse text-sm uppercase tracking-widest flex items-center gap-3">
                            <i className="fa-solid fa-circle-notch animate-spin"></i> Initialisation...
                        </div>
                    </div>
                );
            }

            // Extraction sécurisée
            const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

            const chartData = [
                { name: 'Lun', prix: 3.82 }, { name: 'Mar', prix: 3.85 },
                { name: 'Mer', prix: 3.75 }, { name: 'Jeu', prix: 3.92 },
                { name: 'Ven', prix: 3.88 }, { name: 'Sam', prix: 3.84 },
                { name: 'Dim', prix: 3.95 }
            ];

            return (
                <div className="flex min-h-screen bg-[#0f1117]">
                    {/* Sidebar */}
                    <aside className="w-64 bg-[#0a0c10] border-r border-white/5 p-6 hidden lg:flex flex-col">
                        <div className="flex items-center gap-3 mb-12">
                            <div className="h-10 w-10 custom-gradient rounded-xl flex items-center justify-center text-slate-900 shadow-lg">
                                <i className="fa-solid fa-chart-line"></i>
                            </div>
                            <span className="text-xl font-black italic tracking-tighter">PriceTrack</span>
                        </div>

                        <nav className="space-y-2 flex-1">
                            <NavItem active={view === 'dashboard'} icon="gauge-high" label="Dashboard" onClick={() => setView('dashboard')} />
                            <NavItem active={view === 'history'} icon="clock-rotate-left" label="Historique" onClick={() => setView('history')} />
                            <NavItem active={view === 'saisie'} icon="plus" label="Saisie Relevé" onClick={() => setView('saisie')} />
                        </nav>
                        
                        <div className="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p className="text-[10px] font-black text-slate-500 uppercase">Statut Serveur</p>
                            <div className="flex items-center gap-2 mt-2">
                                <div className="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                <span className="text-xs font-bold text-emerald-500">Connecté</span>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-8 lg:p-12 overflow-y-auto">
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
                            <div>
                                <h1 className="text-3xl font-black tracking-tight text-white capitalize">{view}</h1>
                                <p className="text-slate-500 text-sm mt-1 font-medium">Monitoring tarifaire — {selectedEnseigne}</p>
                            </div>
                            <div className="flex bg-slate-900 rounded-xl p-1 border border-white/5 shadow-inner">
                                {['Leclerc', 'Carrefour', 'Auchan'].map(e => (
                                    <button 
                                        key={e} 
                                        onClick={() => setSelectedEnseigne(e)}
                                        className={`px-4 py-2 rounded-lg text-[10px] font-black transition-all uppercase tracking-widest ${selectedEnseigne === e ? 'bg-sky-500 text-slate-950' : 'text-slate-500 hover:text-slate-300'}`}
                                    >
                                        {e}
                                    </button>
                                ))}
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <StatCard label="Prix Moyen" value="98.45 €" icon="cart-shopping" color="sky" />
                            <StatCard label="Positionnement" value="-1.2 %" icon="arrow-trend-down" color="emerald" />
                            <div className="custom-gradient p-6 rounded-[2rem] text-slate-950 flex flex-col justify-between shadow-lg shadow-sky-500/10">
                                <p className="text-[10px] font-black uppercase tracking-widest opacity-60 text-slate-900">Alertes</p>
                                <h3 className="text-2xl font-black text-slate-900">Aucun décrochage détecté</h3>
                            </div>
                        </div>

                        <div className="glass-card p-8 rounded-[2.5rem]">
                            <h4 className="font-black italic tracking-tighter text-xl mb-8">Analyse de la tendance</h4>
                            <div className="h-[350px] w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={chartData}>
                                        <defs>
                                            <linearGradient id="colorPrice" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#0ea5e9" stopOpacity={0.2}/>
                                                <stop offset="95%" stopColor="#0ea5e9" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#1e293b" />
                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#475569', fontSize: 10, fontWeight: 900}} dy={10} />
                                        <YAxis hide domain={['dataMin - 0.1', 'dataMax + 0.1']} />
                                        <Tooltip contentStyle={{backgroundColor: '#0a0c10', border: '1px solid #1e293b', borderRadius: '16px', color: '#fff'}} />
                                        <Area type="monotone" dataKey="prix" stroke="#0ea5e9" strokeWidth={4} fillOpacity={1} fill="url(#colorPrice)" />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const NavItem = ({ active, icon, label, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${active ? 'bg-sky-500 text-slate-950 shadow-lg' : 'text-slate-500 hover:text-slate-300 hover:bg-white/5'}`}>
                <i className={`fa-solid fa-${icon}`}></i> <span>{label}</span>
            </button>
        );

        const StatCard = ({ label, value, icon, color }) => (
            <div className="glass-card p-6 rounded-[2rem]">
                <div className={`p-3 bg-${color}-500/10 text-${color}-500 w-fit rounded-xl mb-4`}><i className={`fa-solid fa-${icon}`}></i></div>
                <p className="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">{label}</p>
                <h3 className="text-4xl font-black text-white">{value}</h3>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
